<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <header>
        <h1>Ejercicios clase 4</h1>
    </header>
    <main>
        <article>
            <p>Esto es un articulo introductorio</p>
        </article>
        <section>
            <span>¿Donde esta el obelisco?</span>

            <iframe 
                src="https://www.google.com/maps/embed?pb=!1m16!1m12!1m3!1d3284.018271682019!2d-58.384002538254435!3d-34.603699472841456!2m3!
                1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!2m1!1sobelisco!5e0!3m2!1ses-419!2sar!4v1783221925561!5m2!1ses-419!2sar" 
                width="400" height="300" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="strict-origin-when-cross-origin">
            </iframe>

            <span>Mira a este lindo gatito</span>

            <iframe 
                width="560" height="315" src="https://www.youtube.com/embed/-dTa8gchZfc?si=XNzyqrg7alm8Fo7K" title="YouTube video player" 
                frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                referrerpolicy="strict-origin-when-cross-origin" allowfullscreen>
            </iframe>
        </section>

        <form>
            
            <div>
                <label for="pacient">Nombre del Paciente</label>
                <input type="text" id="pacient" name="name" required>
            </div>

            <div>
                <label for="user_email">Email</label>
                <input type="email" id="user_email" name="email" required>
            </div>

            <div>
                <label for="date">Elija el dia de su turno</label>
                <input type="date" id="date" name="date" required>
            </div>

            <div>
               <span>Elija el horario de atencion</span>

               <label for="morning">Mañana</label>
               <input type="radio" id="morning" name="horario" value="morning" checked>

               <label for="evening">Tarde</label>
               <input type="radio" id="evening" name="horario" value="evening">
            </div>

            <button type="submit">Solicitar turno</button>
           
        </form>
    </main>
    <footer></footer>
</body>
</html>
